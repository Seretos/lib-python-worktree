version: 1
isolation: full

setup:
  - name: claude-session-start
    shell: pwsh
    run: |
      $ErrorActionPreference = 'Stop'
      $proj = (Get-Location).Path
      $branch = $env:WORKTREE_BRANCH
      $common = git -C $proj rev-parse --path-format=absolute --git-common-dir
      $project = Split-Path -Leaf (Split-Path -Parent $common)
      $sessionName = "$project/$branch"
      $sessionDir = Join-Path $proj '.claude-session'
      New-Item -ItemType Directory -Force -Path $sessionDir | Out-Null
      $claude = (Get-Command claude -ErrorAction SilentlyContinue).Source
      if ([string]::IsNullOrWhiteSpace($claude)) { $claude = 'claude' }
      $claudeArgs = @(
          '--name', $sessionName,
          '--rc', $sessionName,
          '--bg',
          '--permission-mode', 'bypassPermissions'
      )
      $p = Start-Process -FilePath $claude -ArgumentList $claudeArgs -WorkingDirectory $proj -PassThru
      Set-Content -Path (Join-Path $sessionDir 'session.pid') -Value $p.Id
      Write-Host "Claude session '$sessionName' launched (pid $($p.Id)) -> $sessionDir"

teardown:
  - name: claude-session-stop
    shell: pwsh
    run: |
      $ErrorActionPreference = 'SilentlyContinue'
      $proj = (Get-Location).Path
      $sessionDir = Join-Path $proj '.claude-session'
      $pidFile = Join-Path $sessionDir 'session.pid'
      if (Test-Path $pidFile) {
          $sessPid = (Get-Content $pidFile | Select-Object -First 1)
          if ($sessPid) {
              $sessPid = $sessPid.Trim()
              if ($IsWindows) {
                  $killArgs = @('/PID', $sessPid, '/T', '/F')
                  Start-Process -FilePath 'taskkill' -ArgumentList $killArgs -NoNewWindow -Wait
              } else {
                  & kill -TERM $sessPid 2>$null
              }
          }
          $pidFile | Remove-Item -Force
      }
