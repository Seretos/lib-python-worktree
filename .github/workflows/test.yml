name: tests

# Runs pytest on every push to any branch and on every PR. Distinct
# from release.yml which is workflow_dispatch-driven and produces the
# release-branch + tag.
#
# Matrix: windows-latest + ubuntu-22.04. The 22.04 pin (not
# ubuntu-latest) matches the WSL2 / plugin-binary glibc target, so a
# regression here would be visible to the same downstream consumers.
on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    name: pytest (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-22.04]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install package + test deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run pytest
        shell: pwsh
        run: python -m pytest
