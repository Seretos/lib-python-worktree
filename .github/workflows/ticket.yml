name: open-dep-ticket

# Manual recovery workflow: re-open the dependency-update ticket in one
# or more downstream consumer repos when the automatic step in release.yml
# was skipped or failed (e.g. missing WORKTREE_TICKET_TOKEN at release time).
#
# Unlike the release.yml step this workflow does NOT set continue-on-error
# so that failures are immediately visible to the operator.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "lib-python-worktree version to reference (semver, no leading v) e.g. 0.2.0"
        required: true
        type: string
      consumers:
        description: "Space-separated list of consumer repos (owner/repo) to file tickets in"
        required: false
        type: string
        default: "Seretos/agent-worktree Seretos/workboard"

permissions:
  contents: read

jobs:
  file-tickets:
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - name: Open dependency-update ticket in each consumer
        id: file-tickets
        shell: bash
        # TITLE/BODY live in env (not a run-block heredoc): a heredoc body at
        # column 0 dedents out of the YAML block scalar and breaks the file.
        # A YAML block scalar holds the markdown verbatim and ${{ }} still
        # expands. Bash just references "$TITLE"/"$BODY".
        env:
          CONSUMERS: ${{ inputs.consumers }}
          VERSION: ${{ inputs.version }}
          TITLE: "chore(deps): bump lib-python-worktree to v${{ inputs.version }}"
          BODY: |
            ## Dependency update

            A new release of **lib-python-worktree** has been published: `v${{ inputs.version }}`.

            ### Action required

            1. Update the pin in `pyproject.toml` to:
               ```
               lib-python-worktree @ git+https://github.com/Seretos/lib-python-worktree@v${{ inputs.version }}
               ```
            2. Run `pwsh scripts/test.ps1` to verify the test suite passes.
            3. Run `pwsh scripts/build.ps1` to confirm the build succeeds.
            4. Commit and open a PR.
          # Each per-consumer token below must also carry account-level
          # "Projects: write" alongside its repo-scoped Issues: write, so the
          # board-add call further down authenticates with the same token —
          # no separate board secret is needed.
          WORKTREE_TICKET_TOKEN: ${{ secrets.WORKTREE_TICKET_TOKEN }}
          WORKBOARD_TICKET_TOKEN: ${{ secrets.WORKBOARD_TICKET_TOKEN }}
        run: |
          # Validate version is semver without a leading 'v'.
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-.+)?$ ]]; then
            echo "ERROR: version must be semver without a leading 'v' (e.g. 0.2.0), got: $VERSION"
            exit 1
          fi

          FAILED_LIST=""

          for CONSUMER in $CONSUMERS; do
            echo "Processing consumer: ${CONSUMER}"

            # Select the correct token per consumer.
            case "$CONSUMER" in
              Seretos/agent-worktree) TOKEN="$WORKTREE_TICKET_TOKEN"; TOKEN_NAME="WORKTREE_TICKET_TOKEN" ;;
              Seretos/workboard)      TOKEN="$WORKBOARD_TICKET_TOKEN"; TOKEN_NAME="WORKBOARD_TICKET_TOKEN" ;;
              *) echo "::error::No token configured for consumer ${CONSUMER}"; FAILED_LIST="$FAILED_LIST $CONSUMER"; continue ;;
            esac
            export GH_TOKEN="$TOKEN"

            # Idempotency: skip if an open issue with this exact title already
            # exists — reuse its URL instead of creating a duplicate.
            # --paginate follows all pages; jq filter excludes pull requests.
            ISSUE_URL=$(gh api --paginate "repos/${CONSUMER}/issues?state=open&per_page=100" \
              --jq --arg t "$TITLE" 'map(select((.pull_request|not) and (.title==$t))) | .[0].html_url // empty' 2>/dev/null || true)
            if [ -n "$ISSUE_URL" ]; then
              echo "Issue already exists in ${CONSUMER}, skipping creation."
            else
              # Attempt creation with the 'dependencies' label; fall back
              # without it if the label does not exist in the consumer repo.
              ISSUE_URL=$(gh issue create \
                --repo "$CONSUMER" \
                --title "$TITLE" \
                --body "$BODY" \
                --label dependencies \
              || gh issue create \
                --repo "$CONSUMER" \
                --title "$TITLE" \
                --body "$BODY")
              if [ -n "$ISSUE_URL" ]; then
                echo "Ticket opened in ${CONSUMER}: ${ISSUE_URL}"
              else
                echo "::error::Failed to open ticket in ${CONSUMER}."
                FAILED_LIST="$FAILED_LIST $CONSUMER"
                continue
              fi
            fi

            # Reuses the per-consumer GH_TOKEN exported above, which must
            # also carry account-level "Projects: write".
            gh project item-add 2 --owner Seretos --url "$ISSUE_URL" \
              || echo "::warning::Could not add $ISSUE_URL to project board 2 (check that ${TOKEN_NAME} has account-level Projects: write)."
          done

          echo "failed_consumers=${FAILED_LIST}" >> "$GITHUB_OUTPUT"

      - name: Report per-consumer failures
        if: always()
        shell: bash
        env:
          FAILED_CONSUMERS: ${{ steps.file-tickets.outputs.failed_consumers }}
        run: |
          if [[ -n "${FAILED_CONSUMERS// /}" ]]; then
            echo "::error::Ticket filing failed for:${FAILED_CONSUMERS}"
            exit 1
          fi
